name: Test Polyfill replacements

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: read

jobs:
  validate-polyfill-install-state:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - required-extension: ext-intl
            polyfill-package: symfony/polyfill-intl-normalizer
          - required-extension: ext-mbstring
            polyfill-package: symfony/polyfill-mbstring

    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
          extensions: intl

      - name: Validate polyfill replacement
        shell: bash
        run: |
          set -euo pipefail

          workdir="$(mktemp -d)"
          cd "$workdir"

          composer init --name ci/polyfill-check --no-interaction
          composer require "${{ matrix.required-extension }}" --no-interaction --no-progress
          composer require symfony/string:^7.4 --no-interaction --no-progress

          echo "Validating that ${{ matrix.polyfill-package }} is installed after requiring symfony/string"
          composer show "${{ matrix.polyfill-package }}" --no-ansi > /dev/null

          composer config repositories.polyless path "$GITHUB_WORKSPACE"
          composer config allow-plugins.gared/polyless true
          composer config minimum-stability dev

          composer require --dev gared/polyless:@dev --no-interaction --no-progress
          composer update "${{ matrix.polyfill-package }}" --no-interaction --no-progress

          echo "Validating that ${{ matrix.polyfill-package }} is not installed anymore"
          if composer show "${{ matrix.polyfill-package }}" --no-ansi > /dev/null 2>&1; then
            echo "${{ matrix.polyfill-package }} is still installed"
            exit 1
          fi
